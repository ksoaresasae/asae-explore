<html>

<head>
<title>ASAE Explore Bar v8 Demo</title>
<style>
    .main {
        max-width: 1200px;
        margin: auto;
    }
</style>
</head>

<body>

<!-- ASAE Explore - CSS/JS -->
<link rel="stylesheet" href="asae-explore.css"/>
<link rel="stylesheet" href="ui.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/addsearch-search-ui@0.10/dist/addsearch-search-ui.min.css"/>
<script type="text/javascript" src="asae-explore.js"></script>


<div class="main">

<h1>Hello World</h1>

<p>Lorum ipsum dolor seti ibinerium kelbos do. Lorum ipsum dolor.</p>

<div class="adds-components">
  <div id="searchfield-container"></div>
  <div class="adds-results-main-wrapper">
    <div class="adds-filters-wrapper">
      <div class="adds-filters-main-wrapper adds-close">
        <div class="adds-mobile-filters-toggle"><h3 class="filters-title">Sites</h3><span class="adds-filter-toggle"></span></div>
        <div class="filters-inner-wrapper">
          <div id="selected-filters-container"></div>
          <div class="adds-filters-group">
            <div class="adds-filter-parent-container">
              <div id="filter-container-category"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="adds-results-wrapper">
      <div id="sortby"></div>
      <div id="searchresults-container"></div>
      <div id="pagination-container"></div>
    </div>
  </div>
</div>

</div>

</body>

</html>
